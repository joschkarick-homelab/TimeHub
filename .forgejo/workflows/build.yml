# TODO: adjust runner label (runs-on), secret names (MINDCODE_USER/MINDCODE_TOKEN), and that ${{ github.repository }} resolves to "<owner>/timehub" on this Forgejo instance — coordinate with the Forgejo/Hub admin.
name: build
on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    runs-on: docker
    container:
      image: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -q

  image:
    needs: test
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Log in to mindcode registry
        uses: docker/login-action@v3
        with:
          registry: mindcode.mindsquare.de
          username: ${{ secrets.MINDCODE_USER }}
          password: ${{ secrets.MINDCODE_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mindcode.mindsquare.de/${{ github.repository }}:latest
            mindcode.mindsquare.de/${{ github.repository }}:${{ github.sha }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="TimeHub">
  <!-- Background -->
  <rect width="56" height="56" fill="#242422"/>
  <!-- Letter T (purple) -->
  <!-- top bar -->
  <rect x="6"  y="6"  width="4" height="4" fill="#9B8AFB"/>
  <rect x="14" y="6"  width="4" height="4" fill="#9B8AFB"/>
  <rect x="22" y="6"  width="4" height="4" fill="#9B8AFB"/>
  <!-- stem -->
  <rect x="14" y="14" width="4" height="4" fill="#9B8AFB"/>
  <rect x="14" y="22" width="4" height="4" fill="#9B8AFB"/>
  <rect x="14" y="30" width="4" height="4" fill="#9B8AFB"/>
  <rect x="14" y="38" width="4" height="4" fill="#9B8AFB"/>
  <rect x="14" y="46" width="4" height="4" fill="#9B8AFB"/>
  <!-- Letter H (orange) -->
  <!-- left stem -->
  <rect x="30" y="6"  width="4" height="4" fill="#E8A060"/>
  <rect x="30" y="14" width="4" height="4" fill="#E8A060"/>
  <rect x="30" y="22" width="4" height="4" fill="#E8A060"/>
  <rect x="30" y="30" width="4" height="4" fill="#E8A060"/>
  <rect x="30" y="38" width="4" height="4" fill="#E8A060"/>
  <rect x="30" y="46" width="4" height="4" fill="#E8A060"/>
  <!-- crossbar -->
  <rect x="38" y="30" width="4" height="4" fill="#E8A060"/>
  <!-- right stem -->
  <rect x="46" y="6"  width="4" height="4" fill="#E8A060"/>
  <rect x="46" y="14" width="4" height="4" fill="#E8A060"/>
  <rect x="46" y="22" width="4" height="4" fill="#E8A060"/>
  <rect x="46" y="30" width="4" height="4" fill="#E8A060"/>
  <rect x="46" y="38" width="4" height="4" fill="#E8A060"/>
  <rect x="46" y="46" width="4" height="4" fill="#E8A060"/>
</svg>

{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-semibold">Eintrag bearbeiten</h1>
  <a href="/" class="text-sm text-slate-600 hover:underline">← zur Liste</a>
</div>

{% if error %}
  <div class="mb-4 text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded px-3 py-2 max-w-2xl">
    {{ error | replace('+', ' ') }}
  </div>
{% endif %}

<section class="bg-white border border-slate-200 rounded-lg p-5 max-w-2xl">
  <form method="post" action="/entries/{{ entry.id }}/edit" class="grid grid-cols-1 sm:grid-cols-6 gap-3 sm:items-end">
    <div class="sm:col-span-2">
      <label class="block text-xs font-medium mb-1">Datum</label>
      <input name="entry_date" type="date" required value="{{ entry.entry_date }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
    <div class="sm:col-span-4">
      <label class="block text-xs font-medium mb-1">Projekt</label>
      <select name="project_id" id="entry-project" required
              class="w-full h-10 border border-slate-300 rounded px-2 bg-white">
        {% for p in projects %}
          <option value="{{ p.id }}" {% if p.id == entry.project_id %}selected{% endif %}>
            {{ p.display_label }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="grid grid-cols-3 gap-2 sm:contents">
      <div class="sm:col-span-2">
        <label class="block text-xs font-medium mb-1">Von</label>
        <input name="start_time" type="time"
               value="{{ entry.start_time.strftime('%H:%M') if entry.start_time else '' }}"
               class="w-full h-10 border border-slate-300 rounded px-2" />
      </div>
      <div class="sm:col-span-2">
        <label class="block text-xs font-medium mb-1">Bis</label>
        <input name="end_time" type="time"
               value="{{ entry.end_time.strftime('%H:%M') if entry.end_time else '' }}"
               class="w-full h-10 border border-slate-300 rounded px-2" />
      </div>
      <div class="sm:col-span-2">
        <label class="block text-xs font-medium mb-1">Dauer (Min)</label>
        <input name="duration_minutes" type="number" step="15" min="15" inputmode="numeric"
               value="{{ entry.duration_minutes }}"
               class="w-full h-10 border border-slate-300 rounded px-2" />
      </div>
    </div>
    <div class="sm:col-span-6">
      <label class="block text-xs font-medium mb-1">Beschreibung</label>
      <input name="description" value="{{ entry.description }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
    <div class="sm:col-span-2">
      <label class="block text-xs font-medium mb-1">Sync-Ziel</label>
      <select name="sync_target_override" id="entry-target"
              class="w-full h-10 border border-slate-300 rounded px-2 bg-white">
        <option value="">Projekt-Standard</option>
        {% for t in sync_targets %}
          <option value="{{ t }}" {% if entry.sync_target_override == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>
    </div>
    <div id="entry-sync-fields" class="hidden sm:col-span-6 grid sm:grid-cols-2 gap-3 border-t border-slate-100 pt-3"></div>
    <p class="sm:col-span-6 text-xs text-slate-500 -mt-1">
      Von + Bis überschreiben die Dauer. Sind beide leer, gilt die eingetragene Dauer.
    </p>
    <div class="sm:col-span-6 flex gap-2 pt-2">
      <button class="h-10 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-medium">
        Speichern
      </button>
      <a href="/" class="self-center text-sm text-slate-600 hover:underline">Abbrechen</a>
      <span class="ml-auto"></span>
    </div>
  </form>
  <form method="post" action="/entries/{{ entry.id }}/delete" class="mt-3"
        onsubmit="return confirm('Eintrag wirklich löschen?');">
    <button class="h-10 px-4 bg-rose-600 hover:bg-rose-700 text-white rounded font-medium">
      Löschen
    </button>
  </form>
</section>

{% include "_sync_fields_js.html" %}
<script>
  (function () {
    var REGISTRY = {{ sync_field_registry | tojson }};
    var CURRENT = {{ current_meta | tojson }};
    var PROJECT_TARGETS = {{ project_targets | tojson }};
    var proj = document.getElementById("entry-project");
    var override = document.getElementById("entry-target");
    var box = document.getElementById("entry-sync-fields");
    function effectiveTarget() {
      return override.value || PROJECT_TARGETS[proj.value] || "intern";
    }
    function update() { window.renderSyncFields(box, REGISTRY, effectiveTarget(), CURRENT); }
    proj.addEventListener("change", update);
    override.addEventListener("change", update);
    update();
  })();
</script>
{% endblock %}

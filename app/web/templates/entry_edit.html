{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-semibold">Eintrag bearbeiten</h1>
  <a href="/" class="text-sm text-slate-600 hover:underline">← zur Liste</a>
</div>

<section class="bg-white border border-slate-200 rounded-lg p-5 max-w-2xl">
  <form method="post" action="/entries/{{ entry.id }}/edit" class="grid sm:grid-cols-5 gap-3 items-end">
    <div class="sm:col-span-1">
      <label class="block text-xs font-medium mb-1">Datum</label>
      <input name="entry_date" type="date" required value="{{ entry.entry_date }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
    <div class="sm:col-span-2">
      <label class="block text-xs font-medium mb-1">Projekt</label>
      <select name="project_id" required
              class="w-full h-10 border border-slate-300 rounded px-2 bg-white">
        {% for p in projects %}
          <option value="{{ p.id }}" {% if p.id == entry.project_id %}selected{% endif %}>
            {{ p.display_label }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="sm:col-span-1">
      <label class="block text-xs font-medium mb-1">Dauer (Min, ¼-Std)</label>
      <input name="duration_minutes" type="number" step="15" min="15" required
             value="{{ entry.duration_minutes }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
    <div class="sm:col-span-5">
      <label class="block text-xs font-medium mb-1">Beschreibung</label>
      <input name="description" value="{{ entry.description }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
    <div class="sm:col-span-5 flex gap-2 pt-2">
      <button class="h-10 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-medium">
        Speichern
      </button>
      <a href="/" class="self-center text-sm text-slate-600 hover:underline">Abbrechen</a>
      <form method="post" action="/entries/{{ entry.id }}/delete"
            class="ml-auto"
            onsubmit="return confirm('Eintrag wirklich löschen?');">
        <button class="h-10 px-4 bg-rose-600 hover:bg-rose-700 text-white rounded font-medium">
          Löschen
        </button>
      </form>
    </div>
  </form>
</section>
{% endblock %}

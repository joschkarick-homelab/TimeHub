{% extends "base.html" %}
{% block content %}
{% set back = next_url or "/" %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-bold th-outfit">Eintrag bearbeiten</h1>
  <a href="{{ back }}" class="text-sm text-slate-600 hover:underline">← zurück</a>
</div>

{% if error %}
  <div class="mb-4 text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded px-3 py-2 max-w-2xl">
    {{ error | replace('+', ' ') }}
  </div>
{% endif %}

<section class="bg-white border border-slate-200 p-5 max-w-2xl">
  {% include "_entry_form.html" %}
</section>

{% include "_sync_fields_js.html" %}
{% include "_entry_form_js.html" %}
<script>
  window.wireEntryForm(document.querySelector(".th-entry-form"));
</script>
{% endblock %}

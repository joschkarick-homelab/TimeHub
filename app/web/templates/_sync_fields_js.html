<script>
  // Shared renderer for target-dependent sync fields. Builds inputs named
  // meta__<target>__<key> so the server can pick them up generically.
  //
  // `targets` now accepts a string (single target, backward-compat) or an
  // array of targets. For multiple targets each section gets a small label.
  window.renderSyncFields = function (container, registry, targets, current) {
    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    function dynOptions(source) {
      var src = window.SYNC_DYNAMIC_OPTIONS || {};
      return src[source];
    }
    function subseqScore(token, text) {
      var ti = 0, last = -1, gaps = 0;
      for (var i = 0; i < text.length && ti < token.length; i++) {
        if (text[i] === token[ti]) {
          if (last >= 0) gaps += i - last - 1;
          last = i; ti++;
        }
      }
      return ti === token.length ? gaps : -1;
    }
    function fuzzyScore(query, text) {
      query = String(query || "").toLowerCase().trim();
      text = String(text || "").toLowerCase();
      if (!query) return 0;
      var tokens = query.split(/\s+/), total = 0;
      for (var i = 0; i < tokens.length; i++) {
        var t = tokens[i];
        var idx = text.indexOf(t);
        if (idx !== -1) { total += idx; continue; }
        var sub = subseqScore(t, text);
        if (sub < 0) return -1;
        total += 1000 + sub;
      }
      return total;
    }
    function optHaystack(o) {
      return (o.search != null ? o.search : "") + " " + (o.label || "");
    }
    function initCombobox(wrap, opts, value) {
      var search = wrap.querySelector("[data-combo-search]");
      var hidden = wrap.querySelector("[data-combo-value]");
      var list = wrap.querySelector("[data-combo-list]");
      var active = -1;
      var cur = null;
      for (var i = 0; i < opts.length; i++) {
        if (String(opts[i].value) === String(value)) { cur = opts[i]; break; }
      }
      hidden.value = value || "";
      if (cur) search.value = cur.label || "";
      else if (value) search.value = value;

      function close() { list.classList.add("hidden"); active = -1; }
      function pick(o) {
        hidden.value = o.value != null ? String(o.value) : "";
        search.value = o.label || "";
        close();
        // Bubble a synthetic change so deviation-hint listeners fire.
        hidden.dispatchEvent(new Event("change", { bubbles: true }));
      }
      function render() {
        var q = search.value;
        var scored = [];
        for (var i = 0; i < opts.length; i++) {
          var s = fuzzyScore(q, optHaystack(opts[i]));
          if (s >= 0) scored.push({ o: opts[i], s: s });
        }
        scored.sort(function (a, b) { return a.s - b.s; });
        scored = scored.slice(0, 50);
        if (!scored.length) {
          list.innerHTML = '<li class="px-2 py-1.5 text-xs text-slate-400">Kein Treffer</li>';
        } else {
          list.innerHTML = scored.map(function (e, idx) {
            return '<li role="option" data-idx="' + idx + '" data-value="' + esc(e.o.value) + '"' +
              ' class="px-2 py-1.5 text-sm cursor-pointer hover:bg-slate-100">' +
              esc(e.o.label || e.o.value) + "</li>";
          }).join("");
        }
        list._opts = scored.map(function (e) { return e.o; });
        active = -1;
        list.classList.remove("hidden");
      }
      function highlight() {
        var items = list.querySelectorAll("li[data-idx]");
        items.forEach(function (li, idx) {
          li.classList.toggle("bg-slate-100", idx === active);
        });
        if (active >= 0 && items[active]) items[active].scrollIntoView({ block: "nearest" });
      }
      search.addEventListener("focus", render);
      search.addEventListener("input", function () { hidden.value = ""; render(); });
      search.addEventListener("keydown", function (ev) {
        var n = (list._opts || []).length;
        if (ev.key === "ArrowDown") { ev.preventDefault(); if (n) { active = (active + 1) % n; highlight(); } }
        else if (ev.key === "ArrowUp") { ev.preventDefault(); if (n) { active = (active - 1 + n) % n; highlight(); } }
        else if (ev.key === "Enter") {
          if (active >= 0 && list._opts && list._opts[active]) { ev.preventDefault(); pick(list._opts[active]); }
        } else if (ev.key === "Escape") { close(); }
      });
      list.addEventListener("mousedown", function (ev) {
        var li = ev.target.closest("li[data-idx]");
        if (!li || !list._opts) return;
        ev.preventDefault();
        var o = list._opts[parseInt(li.getAttribute("data-idx"), 10)];
        if (o) pick(o);
      });
      search.addEventListener("blur", function () { setTimeout(close, 100); });
    }

    if (!container) return;
    // Backward-compat: accept a single target string.
    if (typeof targets === "string") targets = targets ? [targets] : [];
    if (!Array.isArray(targets)) targets = [];

    // Only targets that actually have fields in the registry.
    var activeSections = targets.filter(function (t) {
      return ((registry || {})[t] || []).length > 0;
    });

    container.innerHTML = "";
    if (!activeSections.length) { container.classList.add("hidden"); return; }
    container.classList.remove("hidden");

    var showHeaders = activeSections.length > 1;
    var LABELS = { jira: "Jira", salesforce: "Salesforce", bcs: "BCS" };

    activeSections.forEach(function (target) {
      var fields = (registry || {})[target] || [];
      var comboInits = [];

      if (showHeaders) {
        var hdr = document.createElement("div");
        hdr.className = "col-span-2";
        hdr.innerHTML =
          '<p class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mt-1 mb-0.5">' +
          esc(LABELS[target] || target) + "</p>";
        container.appendChild(hdr);
      }

      fields.forEach(function (f) {
        var stored = ((current || {})[target] || {})[f.key] || "";
        var dyn = f.options_source ? dynOptions(f.options_source) : null;
        var opts = dyn != null ? dyn : (f.choices || null);
        var value = stored || (f.default || "");
        var id = "meta_" + target + "_" + f.key;
        var name = "meta__" + target + "__" + f.key;
        var wrap = document.createElement("div");
        var labelHtml =
          '<label class="block text-xs font-medium mb-1" for="' + id + '">' +
            esc(f.label) + (f.required ? ' <span class="text-rose-500">*</span>' : "") +
          "</label>";
        var control;
        var combo = false;
        if (f.searchable && opts && opts.length) {
          combo = true;
          control =
            '<div class="relative" data-combo>' +
              '<input id="' + id + '" type="text" autocomplete="off" data-combo-search role="combobox"' +
              ' placeholder="' + esc(f.placeholder || "Suchen…") + '"' +
              ' class="w-full h-10 border border-slate-300 rounded px-2 bg-white" />' +
              '<input type="hidden" name="' + name + '" data-combo-value />' +
              '<ul data-combo-list role="listbox"' +
              ' class="hidden absolute z-20 left-0 right-0 mt-1 max-h-60 overflow-auto bg-white border border-slate-200 rounded shadow"></ul>' +
            "</div>";
        } else if (opts && opts.length) {
          var optionsHtml = "";
          if (!f.required) optionsHtml += '<option value="">— keine Auswahl —</option>';
          opts.forEach(function (o) {
            var v = o.value != null ? String(o.value) : "";
            var sel = (v === String(value)) ? " selected" : "";
            optionsHtml += '<option value="' + esc(v) + '"' + sel + '>' + esc(o.label || v) + "</option>";
          });
          control = '<select id="' + id + '" name="' + name + '"' +
                    ' class="w-full h-10 border border-slate-300 rounded px-2 bg-white">' +
                    optionsHtml + "</select>";
        } else if (f.options_source) {
          control = '<input id="' + id + '" name="' + name + '" value="' + esc(value) + '"' +
                    ' placeholder="' + esc(f.placeholder || "") + '"' +
                    ' class="w-full h-10 border border-slate-300 rounded px-2" />' +
                    '<p class="text-[11px] text-slate-400 mt-0.5">' +
                    '(Auswahlliste momentan nicht verfügbar — Wert manuell eintragen.)</p>';
        } else {
          control = '<input id="' + id + '" name="' + name + '" value="' + esc(value) + '"' +
                    ' placeholder="' + esc(f.placeholder || "") + '"' +
                    ' class="w-full h-10 border border-slate-300 rounded px-2" />';
        }
        var helpHtml = f.help ? '<p class="text-[11px] text-slate-500 mt-0.5">' + esc(f.help) + "</p>" : "";
        wrap.innerHTML = labelHtml + control + helpHtml;
        container.appendChild(wrap);
        if (combo) comboInits.push({ wrap: wrap, opts: opts, value: value });
      });

      comboInits.forEach(function (c) { initCombobox(c.wrap, c.opts, c.value); });
    });
  };
</script>

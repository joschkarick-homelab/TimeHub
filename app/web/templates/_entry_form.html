{# Reusable "edit entry" form fragment. Rendered both as a standalone page
   (entry_edit.html) and injected into the shared edit modal on the dashboard
   and calendar. Carries no wiring <script> of its own (innerHTML wouldn't run
   it); the dynamic sync fields are wired by window.wireEntryForm() after the
   markup lands, reading the JSON data blocks below. #}
<form method="post" action="/entries/{{ entry.id }}/edit"
      class="th-entry-form grid grid-cols-1 sm:grid-cols-6 gap-3 sm:items-end">
  <input type="hidden" name="next" value="{{ next_url }}" />
  <div class="sm:col-span-2">
    <label class="block text-xs font-medium mb-1">Datum</label>
    <input name="entry_date" type="date" required value="{{ entry.entry_date }}"
           class="w-full h-10 border border-slate-300 rounded px-2" />
  </div>
  <div class="sm:col-span-4">
    <label class="block text-xs font-medium mb-1">Projekt</label>
    <select name="project_id" class="ee-project w-full h-10 border border-slate-300 rounded px-2 bg-white" required>
      {% for p in projects %}
        <option value="{{ p.id }}"
                data-targets="{{ (project_multi_targets.get(p.id) or []) | tojson | e }}"
                data-sf="{{ project_sf_assignments.get(p.id) or '' }}"
                {% if p.id == entry.project_id %}selected{% endif %}>
          {{ p.display_label }}
        </option>
      {% endfor %}
    </select>
  </div>
  <div class="grid grid-cols-3 gap-2 sm:contents">
    <div class="sm:col-span-2">
      <label class="block text-xs font-medium mb-1">Von</label>
      <input name="start_time" type="time"
             value="{{ entry.start_time.strftime('%H:%M') if entry.start_time else '' }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
    <div class="sm:col-span-2">
      <label class="block text-xs font-medium mb-1">Bis</label>
      <input name="end_time" type="time"
             value="{{ entry.end_time.strftime('%H:%M') if entry.end_time else '' }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
    <div class="sm:col-span-2">
      <label class="block text-xs font-medium mb-1">Dauer (Min)</label>
      <input name="duration_minutes" type="number" step="15" min="15" inputmode="numeric"
             value="{{ entry.duration_minutes }}"
             class="w-full h-10 border border-slate-300 rounded px-2" />
    </div>
  </div>
  <div class="sm:col-span-6">
    <label class="block text-xs font-medium mb-1">Beschreibung</label>
    <input name="description" value="{{ entry.description }}"
           class="w-full h-10 border border-slate-300 rounded px-2" />
  </div>

  {# Sync-Ziele: checkboxes for multi-target selection #}
  {% set active_overrides = entry.sync_targets_override or [] %}
  <div class="sm:col-span-6">
    <label class="block text-xs font-medium mb-1">Sync-Ziele</label>
    <div class="flex flex-wrap items-center gap-4 mt-1">
      {% for t_val, t_label in [("jira", "Jira"), ("salesforce", "Salesforce"), ("bcs", "BCS")] %}
      <label class="flex items-center gap-1.5 cursor-pointer text-sm select-none">
        <input type="checkbox" name="sync_targets_override" value="{{ t_val }}"
               class="ee-sync-target h-4 w-4 rounded"
               {% if t_val in active_overrides %}checked{% endif %} />
        {{ t_label }}
      </label>
      {% endfor %}
    </div>
    <p class="text-[11px] text-slate-400 mt-1">Keine Auswahl = Projekt-Standard</p>
    <div class="ee-deviation-hint hidden mt-1.5 text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1.5"></div>
  </div>

  <div class="ee-sync-fields hidden sm:col-span-6 grid sm:grid-cols-2 gap-3 border-t border-slate-100 pt-3"></div>
  <p class="sm:col-span-6 text-xs text-slate-500 -mt-1">
    Von + Bis überschreiben die Dauer. Sind beide leer, gilt die eingetragene Dauer.
  </p>
  <div class="sm:col-span-6 flex gap-2 pt-2">
    <button class="h-10 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-medium">
      Speichern
    </button>
    <a href="{{ next_url or '/' }}" data-modal-cancel
       class="self-center text-sm text-slate-600 hover:underline">Abbrechen</a>
  </div>

  {# Data for window.wireEntryForm — read as text, never executed. #}
  <script type="application/json" class="ee-registry">{{ sync_field_registry | tojson }}</script>
  <script type="application/json" class="ee-current-meta">{{ current_meta | tojson }}</script>
  <script type="application/json" class="ee-project-multi-targets">{{ project_multi_targets | tojson }}</script>
  <script type="application/json" class="ee-project-sf">{{ project_sf_assignments | tojson }}</script>
</form>

<form method="post" action="/entries/{{ entry.id }}/delete" class="mt-3"
      onsubmit="return confirm('Eintrag wirklich löschen?');">
  <input type="hidden" name="next" value="{{ next_url }}" />
  <button class="h-10 px-4 bg-rose-600 hover:bg-rose-700 text-white rounded font-medium">
    Löschen
  </button>
</form>

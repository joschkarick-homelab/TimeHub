{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-bold th-outfit">Projekt bearbeiten</h1>
  <a href="/projects" class="text-sm text-slate-600 hover:underline">← zur Liste</a>
</div>

<section class="bg-white border border-slate-200 p-5 max-w-2xl">
  <form method="post" action="/projects/{{ project.id }}/edit" class="space-y-4">
    <div class="grid sm:grid-cols-2 gap-3">
      <label class="text-sm">
        <span class="block font-medium mb-1">Name</span>
        <input name="name" required value="{{ project.name }}"
               class="w-full h-10 border border-slate-300 rounded px-2" />
      </label>
      <label class="text-sm">
        <span class="block font-medium mb-1">Code <span class="text-slate-400 font-normal">(automatisch)</span></span>
        <input name="code" pattern="[A-Za-z0-9_\-]*" value="{{ project.code }}"
               title="Stabiler Schlüssel für Import/Export — bei Bedarf anpassbar"
               class="w-full h-10 border border-slate-300 rounded px-2 font-mono" />
      </label>
      <div class="text-sm">
        <span class="block font-medium mb-1">Kunde</span>
        {% set customer_value = project.customer %}
        {% include "_customer_field.html" %}
      </div>
      <label class="text-sm">
        <span class="block font-medium mb-1">Farbe</span>
        <input type="color" name="color" value="{{ project.color }}"
               class="w-full h-10 border border-slate-300 rounded px-1 bg-white" />
      </label>
      <label class="text-sm">
        <span class="block font-medium mb-1">Default-Sync-Ziel</span>
        <select name="default_sync_target" id="sync-target"
                class="w-full h-10 border border-slate-300 rounded px-2 bg-white">
          {% for t in sync_targets %}
            <option value="{{ t }}" {% if project.default_sync_target == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="text-sm">
        <span class="block font-medium mb-1">Status</span>
        <select name="status" class="w-full h-10 border border-slate-300 rounded px-2 bg-white">
          {% for s in statuses %}
            <option value="{{ s }}" {% if project.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <div id="sync-fields" class="hidden grid sm:grid-cols-2 gap-3 border-t border-slate-100 pt-3"></div>

    <div class="flex gap-2 pt-2">
      <button class="h-10 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded font-medium">
        Speichern
      </button>
      <a href="/projects" class="text-sm text-slate-600 hover:underline self-center">Abbrechen</a>
    </div>
  </form>
</section>

<script>window.SYNC_DYNAMIC_OPTIONS = {{ (sync_dynamic_options or {}) | tojson }};</script>
{% include "_sync_fields_js.html" %}
<script>
  (function () {
    var REGISTRY = {{ sync_field_registry | tojson }};
    var CURRENT = {{ current_meta | tojson }};
    var sel = document.getElementById("sync-target");
    var box = document.getElementById("sync-fields");
    function update() { window.renderSyncFields(box, REGISTRY, sel.value, CURRENT); }
    sel.addEventListener("change", update);
    update();
  })();
</script>
{% include "_customer_field_js.html" %}
{% endblock %}

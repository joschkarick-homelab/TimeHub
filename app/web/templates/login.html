{% extends "base.html" %}
{% block content %}
<div class="max-w-sm mx-auto mt-12">
  <h1 class="th-outfit font-extrabold text-3xl mb-6"
      style="background: linear-gradient(90deg, var(--purple) 0%, var(--orange) 55%, var(--olive) 100%);
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
    Anmelden
  </h1>
  {% if error %}
    <div class="mb-4 text-sm px-3 py-2 border border-rose-200 bg-rose-50" style="color: #fca5a5;">
      {{ error }}
    </div>
  {% endif %}
  <div class="bg-white border border-slate-200 p-6">
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-xs font-medium mb-1.5" style="color: var(--muted); letter-spacing: .04em;">E-MAIL</label>
        <input name="email" type="email" required autofocus
               class="w-full border border-slate-300 px-3 py-2.5 text-sm" />
      </div>
      <div>
        <label class="block text-xs font-medium mb-1.5" style="color: var(--muted); letter-spacing: .04em;">PASSWORT</label>
        <input name="password" type="password" required
               class="w-full border border-slate-300 px-3 py-2.5 text-sm" />
      </div>
      <button class="w-full bg-indigo-600 text-white py-2.5 font-semibold text-sm th-outfit tracking-widest">
        LOGIN
      </button>
    </form>
    {% if m365_enabled %}
    <div class="flex items-center gap-3 my-4">
      <span class="flex-1 h-px bg-slate-200"></span>
      <span class="text-[10px] tracking-widest" style="color: var(--faint);">ODER</span>
      <span class="flex-1 h-px bg-slate-200"></span>
    </div>
    <a href="/auth/m365/login"
       class="w-full flex items-center justify-center gap-2 border border-slate-300 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">
      <svg width="16" height="16" viewBox="0 0 23 23" aria-hidden="true">
        <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
        <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
        <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
        <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
      </svg>
      Mit Microsoft 365 anmelden
    </a>
    {% endif %}
    <p class="text-xs mt-4" style="color: var(--faint);">
      Erste Anmeldung: Zugangsdaten aus <code style="color: var(--muted);">INITIAL_ADMIN_*</code>.
    </p>
  </div>
</div>
{% endblock %}

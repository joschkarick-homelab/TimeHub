{% extends "base.html" %}
{% block content %}
<div class="max-w-sm mx-auto bg-white rounded-lg shadow border border-slate-200 p-6 mt-12">
  <h1 class="text-xl font-semibold mb-4">Anmelden</h1>
  {% if error %}
    <div class="mb-3 text-sm text-rose-600">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login" class="space-y-3">
    <div>
      <label class="block text-sm font-medium mb-1">E-Mail</label>
      <input name="email" type="email" required autofocus
             class="w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Passwort</label>
      <input name="password" type="password" required
             class="w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded py-2 font-medium">Login</button>
  </form>
  <p class="text-xs text-slate-500 mt-4">
    Erste Anmeldung: nutze die Zugangsdaten aus <code>INITIAL_ADMIN_*</code>.
  </p>
</div>
{% endblock %}

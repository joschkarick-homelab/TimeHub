name: Deploy to Homelab

on:
  workflow_run:
    workflows: ["Build and publish container image"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Render stack.env from secrets
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
          INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
          INITIAL_ADMIN_NAME: ${{ secrets.INITIAL_ADMIN_NAME }}
          APP_PORT: ${{ secrets.APP_PORT }}
          TIMEHUB_TAG: ${{ secrets.TIMEHUB_TAG }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_MAPPING_MODEL: ${{ secrets.AI_MAPPING_MODEL }}
        run: |
          keys=(
            SECRET_KEY POSTGRES_PASSWORD
            INITIAL_ADMIN_EMAIL INITIAL_ADMIN_PASSWORD INITIAL_ADMIN_NAME
            APP_PORT TIMEHUB_TAG
            CORS_ORIGINS ACCESS_TOKEN_EXPIRE_MINUTES
            ANTHROPIC_API_KEY AI_MAPPING_MODEL
          )
          : > stack.env
          for key in "${keys[@]}"; do
            value="${!key}"
            [ -z "$value" ] && continue
            printf '%s=%s\n' "$key" "$value" >> stack.env
          done
          echo "Rendered $(wc -l < stack.env) lines into stack.env"

      - name: Copy compose + env to LXC (via Tailscale SSH)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          scp -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              docker-compose.prod.yml stack.env \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Pull images & restart stack (via Tailscale SSH)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "cd ${DEPLOY_PATH} \
               && chmod 600 stack.env \
               && docker compose -f docker-compose.prod.yml --env-file stack.env pull \
               && docker compose -f docker-compose.prod.yml --env-file stack.env up -d --remove-orphans \
               && docker image prune -f"
